apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-despachos-deployment
  namespace: default
  labels:
    app: back-despachos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back-despachos
  template:
    metadata:
      labels:
        app: back-despachos
    spec:
      containers:
      - name: back-despachos
        image: 363163918702.dkr.ecr.us-east-1.amazonaws.com/despacho:latest
        ports:
        - containerPort: 8081
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: back-despachos-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: back-despachos
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081