apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-despachos-deployment
  namespace: default
  labels:
    app: back-despachos
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back-despachos
  template:
    metadata:
      labels:
        app: back-despachos
    spec:
      containers:
      - name: back-despachos
        image: 363163918702.dkr.ecr.us-east-1.amazonaws.com/despacho:latest
        ports:
        - containerPort: 8081
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
        env:
        - name: DB_ENDPOINT
          value: "db-service"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "db_desarrollo"
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: credenciales-db
              key: MYSQL_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: credenciales-db
              key: MYSQL_PASSWORD    
---
apiVersion: v1
kind: Service
metadata:
  name: back-despachos-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: back-despachos
  ports:
  - protocol: TCP
    port: 8081
    targetPort: 8081