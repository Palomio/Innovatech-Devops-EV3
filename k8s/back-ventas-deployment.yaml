apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-ventas-deployment
  namespace: default
  labels:
    app: back-ventas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back-ventas
  template:
    metadata:
      labels:
        app: back-ventas
    spec:
      containers:
      - name: back-ventas
        image: 363163918702.dkr.ecr.us-east-1.amazonaws.com/ventas:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: back-ventas-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: back-ventas
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080