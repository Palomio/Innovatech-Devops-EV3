apiVersion: apps/v1
kind: Deployment
metadata:
  name: back-ventas-deployment
  namespace: default
  labels:
    app: back-ventas
spec:
  replicas: 2
  selector:
    matchLabels:
      app: back-ventas
  template:
    metadata:
      labels:
        app: back-ventas
    spec:
      containers:
      - name: back-ventas
        # Reemplaza TU_ID_CUENTA_AWS y la región según corresponda a tu Amazon ECR
        image: TU_ID_CUENTA_AWS.dkr.ecr.us-east-1.amazonaws.com/back-ventas:latest
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: back-ventas-service
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: back-ventas
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080